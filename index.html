<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JV web | Servicios Digitales</title>
    <meta name="description" content="Desarrollo de tarjetas digitales y presencia web para negocios en Veracruz.">
    <meta name="author" content="José Vite">
    <meta property="og:title" content="José Vite | Desarrollador Web">
    <meta property="og:description" content="Transforma tu negocio con una tarjeta digital profesional.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://graanhotdog-ops.github.io/recuerdos-fotografia/perfiljosevite.jpg">
    <meta property:="og:url" content="https://graanhotdog-ops.github.io/tarjeta-recuerdos-/">
    
    <style>
        :root {
            --primary: #007AFF; /* Azul profesional */
            --dark: #1c1c1e;
            --light: #f5f5f7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.5rem; margin: 15px 0 5px; }
        p { color: #666; margin-bottom: 30px; }

        .links-container {
            display: grid;
            gap: 15px;
        }

        .link-card {
            background: white;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .link-card:active { transform: scale(0.97); }
        
        .link-card:hover {
          transform: translateY(-3px);
          box-shadow: 0 10px 20px rgba(0,0,0,0.1);
          background-color: #ffffff;
          color: var(--primary);
        }


        .btn-main {
            background: var(--primary);
            color: white;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="perfiljosevite.jpg" alt="Jose Vite" class="profile-img">
        <h1>JV-web</h1>
        <p>Desarrollo Web & Soluciones Digitales</p>

        <div class="links-container">
            <a href="https://wa.me/522295260691?text=Hola,%20me%20interesa%20una%20tarjeta%20digital" class="link-card btn-main" target="_blank" rel="noopener noreferrer">
                💬 Contáctame por WhatsApp
            </a>
            
            <a href="https://graanhotdog-ops.github.io/recuerdos-fotografia/" class="link-card">
                📂 Ver Portafolio (Proyectos)
            </a>

            <a href="https://www.instagram.com/jvg_fotos?igsh=empuZDlkNDc3YTh0" class="link-card">
                📸 Sígueme en Instagram
            </a>
        </div>

        <footer>
            &copy; 2026 | Desarrollado por JV web.
        </footer>
    </div>

</body>
</html>
